services:
  openclaw:
    build: ./openclaw
    container_name: chat94-openclaw
    ports:
      - "18789:18789"
    networks:
      - clawnet

  relay:
    build:
      context: ../../chat94-server
      dockerfile: ${PWD}/relay/Dockerfile
    container_name: chat94-relay
    ports:
      - "7890:7890"
    networks:
      - clawnet

networks:
  clawnet:
    driver: bridge
